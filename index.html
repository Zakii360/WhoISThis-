<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoISThis? - Domain Lookup Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
        }

        #results {
            white-space: pre-wrap;
            background: #f4f4f4;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            color: #333;
        }

        #lookup-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #lookup-button:hover {
            background-color: #45a049;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 14px;
            width: 300px;
            margin-right: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <h1>WhoISThis? Domain Lookup</h1>
    <p>Enter a domain to get detailed WHOIS, DNS, and geolocation information:</p>

    <input type="text" id="domain" placeholder="Enter domain (e.g., example.com)" />
    <button id="lookup-button" onclick="lookupDomain(document.getElementById('domain').value)">Lookup</button>

    <div id="results"></div>

    <script>
        async function lookupDomain(domain) {
            if (!domain.trim()) {
                document.getElementById('results').innerHTML = "Please enter a valid domain.";
                return;
            }

            document.getElementById('results').innerHTML = "Loading...";

            try {
                const response = await fetch('https://zqfwhnnbuetakxdfrtds.supabase.co/functions/v1/lookup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ domain }) 
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('Domain Data:', data);

                    displayResults(data);
                } else {
                    console.error('Error fetching domain data:', data);
                    document.getElementById('results').innerHTML = `Error: ${data.error || 'Unknown error'}`;
                }
            } catch (err) {
                console.error('Error invoking Supabase function:', err);
                document.getElementById('results').innerHTML = "An error occurred while fetching data.";
            }
        }

        function displayResults(data) {
            let resultHTML = `<h3>Domain: ${data.domain}</h3>`;

            if (data.dns && data.dns.length > 0) {
                resultHTML += `<h4>DNS Records:</h4><ul>`;
                data.dns.forEach(record => {
                    resultHTML += `<li><strong>${record.type}</strong>: ${record.value} (TTL: ${record.ttl}s)</li>`;
                });
                resultHTML += `</ul>`;
            } else {
                resultHTML += `<p>No DNS records found.</p>`;
            }

            if (data.geo) {
                resultHTML += `<h4>Geolocation:</h4>
                                <p>City: ${data.geo.city}</p>
                                <p>Region: ${data.geo.region}</p>
                                <p>Country: ${data.geo.country}</p>
                                <p>Coordinates: ${data.geo.lat}, ${data.geo.lon}</p>`;
            } else {
                resultHTML += `<p>No geolocation information available.</p>`;
            }

            document.getElementById('results').innerHTML = resultHTML;
        }
    </script>
</body>

</html>
